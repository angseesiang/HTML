<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Checkout Page</title>
</head>

<body>
    <h1>Checkout</h1>
    <section>
        <h2>Your Cart</h2>
        <img src="https://cdn.freecodecamp.org/curriculum/labs/spoon.jpg" alt="a spoon product">
        <p>Left-handed spoon</p>
        <p>$29.99</p>
    </section>

    <section>
        <h2>Payment Information</h2>
        <form>
        <label for="card-name"> Cardholder Name <span aria-hidden="true">*</span></label>
        <input id="card-name" name="card-name" type="text" required></input>
        
        <p></p>
        <label for="card-number">Card Number<span aria-hidden="true">*</span></label>
        <input type="text" id="card-number" name="card-number" required aria-describedby="card-number-help"></input>
        
        <p id="card-number-help">
        Enter your 16-digit card number without spaces or dashes.
        </p>

        <button type="submit">Place Order</button>
        
        </form>
    </section>
</body>

</html>
